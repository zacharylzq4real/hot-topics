<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热榜聚合</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #333; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab { padding: 10px 20px; background: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: all 0.2s; }
        .tab:hover { opacity: 0.8; }
        .tab.active { background: #1677ff; color: white; }
        .list { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .item { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; display: block; text-decoration: none; color: inherit; }
        .item:hover { background: #fafafa; }
        .item:last-child { border-bottom: none; }
        .rank { display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; border-radius: 4px; margin-right: 10px; font-size: 12px; font-weight: bold; }
        .rank-1 { background: #ff4d4f; color: white; }
        .rank-2 { background: #ff7a45; color: white; }
        .rank-3 { background: #ffa940; color: white; }
        .rank-other { background: #d9d9d9; color: #666; }
        .title { font-size: 15px; color: #333; }
        .hot { font-size: 12px; color: #ff4d4f; margin-top: 5px; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .error { text-align: center; padding: 40px; color: #ff4d4f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 热榜聚合</h1>
        <div class="tabs">
            <button class="tab active" data-type="zhihu">知乎热榜</button>
            <button class="tab" data-type="weibo">微博热搜</button>
        </div>
        <div class="list" id="list">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        var PORT = 3000;
        var API_BASE = 'http://localhost:' + PORT + '/api/';
        
        document.querySelectorAll('.tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                loadData(this.dataset.type);
            });
        });
        
        function loadData(type) {
            document.querySelectorAll('.tab').forEach(function(t) {
                t.classList.remove('active');
            });
            document.querySelector('[data-type="' + type + '"]').classList.add('active');
            
            var list = document.getElementById('list');
            list.innerHTML = '<div class="loading">加载中...</div>';
            
            fetch(API_BASE + type)
                .then(function(res) {
                    if (!res.ok) throw new Error('请求失败');
                    return res.json();
                })
                .then(function(result) {
                    var items = result.data || result;
                    if (!items || items.length === 0) {
                        list.innerHTML = '<div class="loading">暂无数据</div>';
                        return;
                    }
                    list.innerHTML = items.map(function(item, index) {
                        var rankClass = index < 3 ? 'rank-' + (index + 1) : 'rank-other';
                        return '<a class="item" href="' + item.url + '" target="_blank">' +
                            '<span class="rank ' + rankClass + '">' + (index + 1) + '</span>' +
                            '<span class="title">' + item.title + '</span>' +
                            '<div class="hot">' + (item.hot || '') + '</div>' +
                        '</a>';
                    }).join('');
                })
                .catch(function(error) {
                    list.innerHTML = '<div class="error">请求出错: ' + error.message + '</div>';
                });
        }
        
        loadData('zhihu');
    </script>
</body>
</html>
